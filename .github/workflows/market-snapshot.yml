name: market-snapshot

# ===========================================================================
# Lightweight market-context refresh. Independent of the main earnings
# ingestion workflow so it doesn't queue behind 16-min NSE sweeps.
#
# Cadence:
#   Every 15 min, 03:00–11:59 UTC (= 08:30–17:29 IST) weekdays — covers
#   pre-open through post-close on NSE/BSE. Outside those hours the
#   previous snapshot stays live (the dashboard shows 'Updated HH:MM
#   IST' so staleness is visible).
#
# Runtime budget: ~10 s per run (three yfinance fast_info lookups +
# three Supabase inserts). Well under GitHub Actions' 30-min cap.
# ===========================================================================

on:
  schedule:
    - cron: '*/15 3-11 * * 1-5'
  workflow_dispatch:

# Market snapshots never need to pile up; if a previous one is still
# running, drop the new one silently.
concurrency:
  group: market-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Write market snapshot
        run: python scripts/market_snapshot.py
