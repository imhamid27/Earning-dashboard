name: earnings-ingest

# ===========================================================================
# Cloud-scheduled ingestion for India Earnings Tracker.
# ---------------------------------------------------------------------------
# Runs on GitHub's hosted runners. Cadences:
#
#   daily     — 3× weekdays at 08:00 / 15:00 / 21:00 IST
#               (02:30 / 09:30 / 15:30 UTC)
#               Scrapes NSE + BSE + Moneycontrol calendars and triggers
#               Screener for freshly-announced companies. Indian filings
#               come in waves (pre-market + post-close + late evening) so
#               3× coverage catches every window.
#
#   hourly    — every 30 min, 04:00–16:00 UTC (09:30–21:30 IST) weekdays
#               Pulls XBRL filings for events due today.
#
#   backfill  — Sunday 18:00 UTC (23:30 IST)
#               Light weekly sweep + gap fill.
#
# Requires these repository Secrets:
#   SUPABASE_URL                (usually the NEXT_PUBLIC_SUPABASE_URL value)
#   SUPABASE_SERVICE_ROLE_KEY   (secret — enables writes past RLS)
# ===========================================================================

on:
  schedule:
    # daily calendar refresh × 3 (IST 08:00, 15:00, 21:00)
    - cron:  '30 2,9,15 * * 1-5'
    # hourly sweeps (every 30 min from 04:00 to 16:00 UTC weekdays)
    - cron:  '*/30 4-16 * * 1-5'
    # weekly backfill
    - cron:  '0 18 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Manual run mode'
        required: true
        default: 'hourly'
        type: choice
        options: [daily, hourly, backfill]

jobs:
  run:
    runs-on: ubuntu-latest
    # Hard cap: no single run blocks the schedule for more than this. We
    # learned the hard way that a stalled Sunday backfill can serialise and
    # starve the Mon–Fri daily/hourly slots.
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NSE_RPS: "2"
      BSE_RPS: "2"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      # Decide which mode to run based on the scheduled cron expression
      # that triggered us. workflow_dispatch uses the manual input.
      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            '30 2,9,15 * * 1-5')  echo "mode=daily"    >> "$GITHUB_OUTPUT" ;;
            '*/30 4-16 * * 1-5')  echo "mode=hourly"   >> "$GITHUB_OUTPUT" ;;
            '0 18 * * 0')         echo "mode=backfill" >> "$GITHUB_OUTPUT" ;;
            *)                    echo "mode=hourly"   >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run ingest (${{ steps.mode.outputs.mode }})
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -e
          case "$MODE" in
            daily)
              # Scope: NIFTY 500 only. --include-untracked was removed
              # on 2026-04-20 after confirming that BSE small-cap shells
              # had no usable data source (no NSE XBRL, not on Screener)
              # and were tripping the hourly cron with empty-result
              # failures. Calendars silently skip untracked scrips.
              python scripts/nse_calendar.py
              python scripts/bse_calendar.py
              python scripts/moneycontrol_calendar.py
              ;;
            hourly)
              # Sweep 1 (reactive): poll every NIFTY-500 company for fresh
              # NSE XBRL filings — catches companies we didn't know had
              # announced.
              python scripts/nse_results.py
              # Sweep 2 (triggered): for every company whose announcement
              # has been confirmed but whose numbers are still missing,
              # try NSE XBRL → Screener in priority order. Closes the
              # gap between calendar detection and numbers landing on the
              # dashboard.
              python scripts/fetch_results.py
              ;;
            backfill)
              # Light weekly sweep: only the latest quarter per company +
              # Screener fill for companies still missing data. Previous
              # "--quarters 2" run could 4× the wall time when NSE or
              # Screener throttled, starving cron.
              python scripts/nse_results.py --all --quarters 1
              python scripts/screener_results.py --missing
              ;;
            *)
              echo "unknown mode: $MODE" >&2; exit 2 ;;
          esac

      # Optional: upload the ingest log as an artifact so you can debug failed
      # runs without relying on Actions' transient console output.
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: earnings-${{ steps.mode.outputs.mode }}-${{ github.run_id }}
          path: |
            logs/
            *.log
          if-no-files-found: ignore
          retention-days: 7
