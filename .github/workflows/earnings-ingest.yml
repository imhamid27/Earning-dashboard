name: earnings-ingest

# ===========================================================================
# Cloud-scheduled ingestion for India Earnings Tracker.
# ---------------------------------------------------------------------------
# Runs on GitHub's hosted runners. Cadences:
#
#   daily     — 3× weekdays at 08:00 / 15:00 / 21:00 IST
#               (02:30 / 09:30 / 15:30 UTC)
#               Scrapes NSE + BSE + Moneycontrol calendars and triggers
#               Screener for freshly-announced companies. Indian filings
#               come in waves (pre-market + post-close + late evening) so
#               3× coverage catches every window.
#
#   hourly    — every 30 min, 04:00–16:00 UTC (09:30–21:30 IST) weekdays
#               Pulls XBRL filings for events due today.
#
#   backfill  — Sunday 18:00 UTC (23:30 IST)
#               Light weekly sweep + gap fill.
#
# Requires these repository Secrets:
#   SUPABASE_URL                (usually the NEXT_PUBLIC_SUPABASE_URL value)
#   SUPABASE_SERVICE_ROLE_KEY   (secret — enables writes past RLS)
# ===========================================================================

on:
  schedule:
    # daily calendar refresh × 3 (IST 08:00, 15:00, 21:00)
    - cron:  '30 2,9,15 * * 1-5'
    # hourly sweeps (top of every hour, 04:00–16:00 UTC weekdays). The
    # previous every-30-min cadence caused GitHub Actions to skip slots
    # whenever a run exceeded 30 min — which is common now that the
    # universe is ~1,080 companies and an hourly pass averages ~16 min.
    # Top-of-hour gives a comfortable buffer while keeping freshness
    # acceptable (results drop in bursts around 09:00 / 15:30 / 18:00
    # IST, all of which are covered by the daily calendar slots above).
    - cron:  '0 4-16 * * 1-5'
    # weekly backfill
    - cron:  '0 18 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Manual run mode'
        required: true
        default: 'hourly'
        type: choice
        options: [daily, hourly, backfill]

# Serialise runs of this workflow — queued, not dropped. Previously a
# long-running schedule tick would cause GitHub Actions to skip any
# overlapping scheduled run entirely; `cancel-in-progress: false`
# means slots that land while another run is mid-flight wait their
# turn instead of being lost.
concurrency:
  group: earnings-ingest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Hard cap: no single run blocks the schedule for more than this. We
    # learned the hard way that a stalled Sunday backfill can serialise and
    # starve the Mon–Fri daily/hourly slots.
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NSE_RPS: "2"
      BSE_RPS: "2"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      # Decide which mode to run based on the scheduled cron expression
      # that triggered us. workflow_dispatch uses the manual input.
      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            '30 2,9,15 * * 1-5')  echo "mode=daily"    >> "$GITHUB_OUTPUT" ;;
            '0 4-16 * * 1-5')     echo "mode=hourly"   >> "$GITHUB_OUTPUT" ;;
            '0 18 * * 0')         echo "mode=backfill" >> "$GITHUB_OUTPUT" ;;
            *)                    echo "mode=hourly"   >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run ingest (${{ steps.mode.outputs.mode }})
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -e
          case "$MODE" in
            daily)
              # Scope: NIFTY 500 only. --include-untracked was removed
              # on 2026-04-20 after confirming that BSE small-cap shells
              # had no usable data source (no NSE XBRL, not on Screener)
              # and were tripping the hourly cron with empty-result
              # failures. Calendars silently skip untracked scrips.
              python scripts/nse_calendar.py
              python scripts/bse_calendar.py
              python scripts/moneycontrol_calendar.py
              ;;
            hourly)
              # Sweep 1: poll every NIFTY-500 company for fresh NSE XBRL
              # filings — catches companies we didn't know had announced.
              python scripts/nse_results.py
              # Sweep 2: BSE filing-link poll. For every NIFTY-500 scrip,
              # record the PDF URL on the matching announcement_events
              # row so /q4 can surface 'View filing ↗' even before our
              # numbers pipeline catches up from Screener.
              python scripts/bse_results.py
              # Sweep 3: for every company whose announcement has been
              # confirmed but whose numbers are still missing, try NSE
              # XBRL → Screener in priority order. Closes the gap
              # between calendar detection and numbers landing on the
              # dashboard.
              python scripts/fetch_results.py
              # (Market snapshot moved to its own workflow —
              # .github/workflows/market-snapshot.yml — runs every
              # 15 min during trading hours on a separate concurrency
              # group so it doesn't queue behind the 16-min NSE sweep.)
              ;;
            backfill)
              # Light weekly sweep: only the latest quarter per company +
              # Screener fill for companies still missing data. Previous
              # "--quarters 2" run could 4× the wall time when NSE or
              # Screener throttled, starving cron.
              python scripts/nse_results.py --all --quarters 1
              python scripts/screener_results.py --missing
              ;;
            *)
              echo "unknown mode: $MODE" >&2; exit 2 ;;
          esac

      # Optional: upload the ingest log as an artifact so you can debug failed
      # runs without relying on Actions' transient console output.
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: earnings-${{ steps.mode.outputs.mode }}-${{ github.run_id }}
          path: |
            logs/
            *.log
          if-no-files-found: ignore
          retention-days: 7
