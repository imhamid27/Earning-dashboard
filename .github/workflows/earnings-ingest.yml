name: earnings-ingest

# ===========================================================================
# Cloud-scheduled ingestion for the Corporate Earnings Dashboard.
# ---------------------------------------------------------------------------
# Runs on GitHub's hosted runners. Cadences:
#
#   daily     — 3× weekdays at 08:00 / 15:00 / 21:00 IST
#               (02:30 / 09:30 / 15:30 UTC)
#               Scrapes NSE + BSE + Moneycontrol calendars and triggers a
#               quick results sweep immediately after — so announcements
#               discovered by the calendar are fetched in the same run
#               rather than waiting for the next hourly slot.
#               The 21:00 IST slot is especially important: it fires right
#               as post-market board meetings start publishing filings.
#               Also refreshes expert quotes (seeds + ages out stale ones).
#
#   hourly    — top of every hour, 04:00–19:00 UTC (09:30 IST – 00:30 IST)
#               weekdays. Extended from the previous 16:00 UTC cutoff to
#               cover the late-evening Indian filing window (companies
#               regularly file between 17:00–19:00 UTC / 22:30–00:30 IST).
#               Pulls XBRL filings for events due today/recently.
#               Runs generate_commentary.py on rows updated in last 4h.
#
#   morning   — 02:00 UTC (07:30 IST) weekdays
#               Early catch-up before morning viewers arrive. Picks up
#               any filings that landed between 19:00 UTC yesterday and
#               now (overnight + very-late filers, ~8h window).
#
#   backfill  — Sunday 18:00 UTC (23:30 IST)
#               Light weekly sweep + gap fill + full commentary refresh.
#
# Requires these repository Secrets:
#   SUPABASE_URL                (usually the NEXT_PUBLIC_SUPABASE_URL value)
#   SUPABASE_SERVICE_ROLE_KEY   (secret — enables writes past RLS)
# ===========================================================================

on:
  schedule:
    # Calendar refresh × 3 (IST 08:00, 15:00, 21:00 = 02:30, 09:30, 15:30 UTC)
    # Each daily run also does a quick results sweep after the calendar scripts.
    - cron: '30 2,9,15 * * 1-5'
    # Fast XBRL check every 2 hours, 09:30–23:30 IST (04:00–18:00 UTC).
    # Only runs nse_results + bse_results (~5 min each) so runner minutes
    # stay low. Heavy work (Screener, PDF, commentary, coverage) is handled
    # by the 3× daily runs above. 7 runs/day × ~5 min = ~35 min/day.
    - cron: '0 4,6,8,10,12,14,16 * * 1-5'
    # Early-morning catch-up: 02:00 UTC (07:30 IST) weekdays — full sweep
    # picks up anything that filed overnight before morning readers arrive.
    - cron: '0 2 * * 1-5'
    # Weekly backfill: Sunday 18:00 UTC (23:30 IST)
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Manual run mode'
        required: true
        default: 'hourly'
        type: choice
        options: [daily, hourly, backfill, commentary, coverage]

# Serialise runs of this workflow — queued, not dropped. Previously a
# long-running schedule tick would cause GitHub Actions to skip any
# overlapping scheduled run entirely; `cancel-in-progress: false`
# means slots that land while another run is mid-flight wait their
# turn instead of being lost.
concurrency:
  group: earnings-ingest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Hard cap: no single run blocks the schedule for more than this. We
    # learned the hard way that a stalled Sunday backfill can serialise and
    # starve the Mon–Fri daily/hourly slots.
    # Raised from 30 → 40 min so daily runs (which run 8 scripts) can
    # complete without timeout-killing the result-sweep phase.
    timeout-minutes: 40
    env:
      TZ: Asia/Kolkata
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      NSE_RPS: "2"
      BSE_RPS: "2"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      # Tesseract OCR binary + Poppler for pymupdf rasterisation. Only
      # used by bse_pdf_results.py when it encounters a scanned/image PDF
      # (Navkar Corp, ICICI AMC, Aqylon, etc.) — about 5-15% of BSE
      # filings. Text-based PDFs skip this path entirely and parse
      # instantly via pdfplumber.
      - name: Install native OCR deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            poppler-utils
          tesseract --version | head -1

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      # Decide which mode to run based on the scheduled cron expression
      # that triggered us. workflow_dispatch uses the manual input.
      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            '30 2,9,15 * * 1-5')           echo "mode=daily"    >> "$GITHUB_OUTPUT" ;;
            '0 4,6,8,10,12,14,16 * * 1-5') echo "mode=hourly"   >> "$GITHUB_OUTPUT" ;;
            '0 2 * * 1-5')                 echo "mode=hourly"   >> "$GITHUB_OUTPUT" ;;
            '0 18 * * 0')                  echo "mode=backfill" >> "$GITHUB_OUTPUT" ;;
            *)                             echo "mode=hourly"   >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run ingest (${{ steps.mode.outputs.mode }})
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -e
          case "$MODE" in
            daily)
              # Phase 1 — Calendar refresh. Scrape NSE + BSE + Moneycontrol
              # for today's board meetings and seed announcement_events.
              # --include-untracked removed on 2026-04-20 (BSE small-cap
              # shells had no usable XBRL/Screener source).
              python scripts/nse_calendar.py
              python scripts/bse_calendar.py
              python scripts/moneycontrol_calendar.py
              # Expert quotes: seed starter set (idempotent) + age out >90d.
              python scripts/fetch_expert_quotes.py --seed --deactivate-old 90
              # Phase 2 — Related Coverage. Run BEFORE the result sweeps so
              # stories are refreshed even if Phase 3 runs long and times out.
              # Fetches contextual news for leading/lagging sectors and outlier
              # companies. Runs 3× daily (08:00, 15:00, 21:00 IST).
              python scripts/fetch_related_coverage.py
              # Phase 3 — Immediate result sweep. Fetch numbers for any
              # announcements discovered in Phase 1 WITHOUT waiting for the
              # next hourly slot. Critical for the 21:00 IST daily run which
              # fires right as post-market board meetings start publishing.
              # --quarters 1: current quarter only; Sunday backfill does history.
              python scripts/nse_results.py --quarters 1
              python scripts/bse_results.py
              python scripts/bse_pdf_results.py --days 1
              python scripts/fetch_results.py
              ;;
            hourly)
              # Lightweight XBRL + filing-link check — runs every 2 hours.
              # Kept minimal (~5 min total) so the 7 daily slots stay cheap.
              # Heavy work (Screener, PDF parsing, commentary, coverage) all
              # runs in the 3× daily slots above which have 40-min budgets.

              # Sweep 1: fresh NSE XBRL for announced companies only.
              # --quarters 1: current quarter — history is for Sunday backfill.
              python scripts/nse_results.py --quarters 1

              # Sweep 2: record BSE filing PDF links so 'View filing ↗'
              # appears on the dashboard even before numbers are parsed.
              python scripts/bse_results.py
              ;;
            backfill)
              # Light weekly sweep: only the latest quarter per company +
              # Screener fill for companies still missing data. Previous
              # "--quarters 2" run could 4× the wall time when NSE or
              # Screener throttled, starving cron.
              python scripts/nse_results.py --all --quarters 1
              python scripts/screener_results.py --missing
              # Full commentary refresh on Sunday — regenerates all rows
              # for the current quarter so any data corrections from the
              # week are reflected in the live commentary block.
              python scripts/generate_commentary.py --all
              ;;
            commentary)
              # Lightweight commentary-only pass. Use this when you want
              # to regenerate all commentary without running the full
              # ingestion sweep. Completes in ~5-8 minutes; safe to run
              # alongside the hourly schedule.
              python scripts/generate_commentary.py --all
              ;;
            coverage)
              # "In Context" news refresh only — fetches latest articles
              # from all 10 sources (BS, Mint, ET, CNBC-TV18, Moneycontrol
              # via direct RSS; The Core, Reuters, Bloomberg via Google News)
              # and generates AI briefs. Completes in ~2-3 minutes.
              python scripts/fetch_related_coverage.py
              ;;
            *)
              echo "unknown mode: $MODE" >&2; exit 2 ;;
          esac

      # Optional: upload the ingest log as an artifact so you can debug failed
      # runs without relying on Actions' transient console output.
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: earnings-${{ steps.mode.outputs.mode }}-${{ github.run_id }}
          path: |
            logs/
            *.log
          if-no-files-found: ignore
          retention-days: 7
